name: Terraform Apply

# Auto-apply on push to main when terraform/ files change.
# The plan was already reviewed during the PR (terraform-plan.yml);
# this workflow executes the approved changes.
on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"

env:
  TF_WORKING_DIR: terraform/environments/dev
  AWS_REGION: us-east-1
  TF_VAR_api_token: ${{ secrets.API_TOKEN }}
  TF_VAR_last_rotation: ${{ vars.LAST_ROTATION }}

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~> 1.10"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # One-time bootstrap: import the OIDC role created manually in the
      # AWS Console.  After the first successful apply this step is a no-op
      # (import of an already-managed resource exits 0 with a warning).
      # TODO: remove this step after the first successful apply.
      - name: Import OIDC role (bootstrap)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform import \
            module.github_oidc.aws_iam_role.github_actions \
            pining-for-the-data-github-actions-dev \
            2>&1 || true

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -no-color
