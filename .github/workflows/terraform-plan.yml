name: Terraform Plan

# Plan is a PR-review tool only. On push-to-main, terraform-apply.yml runs
# and publishes its own plan inline, so a parallel Plan job would race Apply
# for the S3 state lock. See luxury-lakehouse PR #131.
on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

env:
  TF_WORKING_DIR: terraform/environments/dev
  AWS_REGION: us-east-1
  TF_VAR_api_token: ${{ secrets.API_TOKEN }}
  TF_VAR_last_rotation: ${{ vars.LAST_ROTATION }}

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.10"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive -diff

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      # One-time bootstrap: import the OIDC role created manually in the
      # AWS Console.  After the first successful apply this is a no-op.
      # TODO: remove this step after the first successful apply.
      - name: Import OIDC role (bootstrap)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform import \
            module.github_oidc.aws_iam_role.github_actions \
            pining-for-the-data-github-actions-dev \
            2>&1 || true

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan

      - name: Comment Plan on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: github.event_name == 'pull_request'
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync('terraform show -no-color tfplan', {
              cwd: '${{ env.TF_WORKING_DIR }}'
            }).toString();

            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n<details>\n<summary>Show plan output</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n</details>`
            });
