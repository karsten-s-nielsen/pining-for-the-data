name: Terraform Apply

# Auto-apply on push to main when terraform/ files change.
# The plan was already reviewed during the PR (terraform-plan.yml);
# this workflow executes the approved changes.
on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"

env:
  TF_WORKING_DIR: terraform/environments/dev
  AWS_REGION: us-east-1
  TF_VAR_api_token: ${{ secrets.API_TOKEN }}
  TF_VAR_last_rotation: ${{ vars.LAST_ROTATION }}

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~> 1.10"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # One-time bootstrap: import the OIDC role created manually in the
      # AWS Console.  After the first successful apply this step is a no-op
      # (import of an already-managed resource exits 0 with a warning).
      # TODO: remove this step after the first successful apply.
      - name: Import OIDC role (bootstrap)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform import \
            module.github_oidc.aws_iam_role.github_actions \
            pining-for-the-data-github-actions-dev \
            2>&1 || true

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -no-color
